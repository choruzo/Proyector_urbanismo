# Configuración de Alembic para el Proyector Urbanístico de Getafe
# La URL de base de datos se gestiona en migrations/env.py via Pydantic Settings

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

# URL vacía — env.py la inyecta desde app.core.config.settings.DATABASE_URL
sqlalchemy.url =

# Formato del nombre de los archivos de versión
file_template = %%(rev)s_%%(slug)s

# Zona horaria para timestamps en migraciones
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
